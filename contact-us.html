<div class="contact-container">

  <!-- Left Column with Images -->
  <div class="contact-info">
    <h2>Our Information</h2>

    <div class="info-item">
        <img src="image15.png" alt="Business">
        <span>follow us</span>
      </div>

      <div class="info-item">
        <img src="image12.png" alt="Phone">
